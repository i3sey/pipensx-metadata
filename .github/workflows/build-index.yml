name: Build metadata index

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: "Build a new release even when upstream commits are unchanged"
        required: false
        default: "true"

permissions:
  contents: write

concurrency:
  group: metadata-index
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Test generator
        run: python3 -m unittest discover -s tests -v

      - name: Resolve source revisions
        id: sources
        shell: bash
        run: |
          set -euo pipefail
          langegen="$(git ls-remote https://github.com/Langegen/switch-games.git refs/heads/main | cut -f1)"
          titledb="$(git ls-remote https://github.com/blawar/titledb.git refs/heads/master | cut -f1)"
          curl -fsSL https://github.com/${GITHUB_REPOSITORY}/releases/latest/download/manifest.json \
            -o /tmp/previous-manifest.json || true
          curl -fsSL https://github.com/${GITHUB_REPOSITORY}/releases/download/filelists-cache/filelists.json \
            -o /tmp/previous-filelists.json || true
          needs_filelists=false
          if [[ ! -s /tmp/previous-filelists.json ]]; then
            needs_filelists=true
          elif [[ -s /tmp/previous-manifest.json ]] && \
               [[ "$(jq -r '.stats.fileListMissing // 0' /tmp/previous-manifest.json)" != "0" ]]; then
            needs_filelists=true
          fi
          changed=true
          if [[ -s /tmp/previous-manifest.json ]] && \
             [[ -s /tmp/previous-filelists.json ]] && \
             [[ "$(jq -r .langegenCommit /tmp/previous-manifest.json)" == "$langegen" ]] && \
             [[ "$(jq -r .titledbCommit /tmp/previous-manifest.json)" == "$titledb" ]] && \
             [[ "$needs_filelists" == "false" ]]; then
            changed=false
          fi
          tag="metadata-${langegen:0:12}-${titledb:0:12}"
          if [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" && \
                "${{ github.event.inputs.force_rebuild }}" == "true" ]] || \
             [[ "$needs_filelists" == "true" ]]; then
            changed=true
            tag="${tag}-run-${GITHUB_RUN_NUMBER}"
          fi
          echo "langegen=$langegen" >> "$GITHUB_OUTPUT"
          echo "titledb=$titledb" >> "$GITHUB_OUTPUT"
          echo "changed=$changed" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Build verified index
        if: steps.sources.outputs.changed == 'true'
        shell: bash
        env:
          RUTRACKER_COOKIE: ${{ secrets.RUTRACKER_COOKIE }}
        run: |
          set -euo pipefail
          previous=()
          if [[ -s /tmp/previous-manifest.json ]]; then
            previous=(--previous-manifest /tmp/previous-manifest.json)
          fi
          filelists=()
          if [[ -s /tmp/previous-filelists.json ]]; then
            filelists=(--previous-filelists /tmp/previous-filelists.json)
          fi
          python3 build_index.py \
            --langegen https://raw.githubusercontent.com/Langegen/switch-games/${{ steps.sources.outputs.langegen }}/switch_games.json \
            --titledb https://raw.githubusercontent.com/blawar/titledb/${{ steps.sources.outputs.titledb }}/US.en.json \
            --langegen-commit "${{ steps.sources.outputs.langegen }}" \
            --titledb-commit "${{ steps.sources.outputs.titledb }}" \
            --index-url "https://github.com/${GITHUB_REPOSITORY}/releases/download/${{ steps.sources.outputs.tag }}/game_metadata_index.json" \
            --output output \
            --require-filelists \
            --filelist-fetch-limit 300 \
            --filelist-fetch-timeout-seconds 20 \
            --cache-only-on-fetch-limit \
            "${previous[@]}" \
            "${filelists[@]}"

      - name: Publish immutable release
        if: steps.sources.outputs.changed == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if [[ -s output/manifest.json ]]; then
            gh release create "${{ steps.sources.outputs.tag }}" \
              output/game_metadata_index.json \
              output/manifest.json \
              output/match-report.json \
              output/filelists.json \
              --repo "$GITHUB_REPOSITORY" \
              --title "Metadata ${{ steps.sources.outputs.tag }}" \
              --notes "Langegen ${{ steps.sources.outputs.langegen }}; titledb ${{ steps.sources.outputs.titledb }}" \
              --latest
            gh release upload filelists-cache output/filelists.json \
              --repo "$GITHUB_REPOSITORY" \
              --clobber || \
            gh release create filelists-cache output/filelists.json \
              --repo "$GITHUB_REPOSITORY" \
              --title "File-list cache" \
              --notes "Latest RuTracker file-list cache"
          else
            gh release upload filelists-cache output/filelists.json \
              --repo "$GITHUB_REPOSITORY" \
              --clobber || \
            gh release create filelists-cache output/filelists.json \
              --repo "$GITHUB_REPOSITORY" \
              --title "File-list cache" \
              --notes "Partial RuTracker file-list cache"
          fi
